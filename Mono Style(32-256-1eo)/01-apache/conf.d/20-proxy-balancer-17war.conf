# NSIGHT 17 WAR Reverse Proxy — 개발용 단일 VM
# Apache → Tomcat localhost:8080 직접 프록시 (Balancer/Sticky/Cluster 없음)

ProxyPass "/server-status" "!"
ProxyPass "/balancer-manager" "!"
ProxyPass "/favicon.ico" "!"

# Tomcat 백엔드 (동일 VM) — 10-ssl-virtualhost.conf 에서만 Include
RedirectMatch 302 ^/$ /portal/

# nsight-auth.war - 인증/세션/SSO 연계
ProxyPass        "/auth/" "http://127.0.0.1:8080/auth/" timeout=30 retry=0
ProxyPassReverse "/auth/" "http://127.0.0.1:8080/auth/"
ProxyPassReverseCookiePath "/auth/" "/auth/"

# nsight-portal.war - 메인 포털/공통 메뉴
ProxyPass        "/portal/" "http://127.0.0.1:8080/portal/" timeout=30 retry=0
ProxyPassReverse "/portal/" "http://127.0.0.1:8080/portal/"
ProxyPassReverseCookiePath "/portal/" "/portal/"

