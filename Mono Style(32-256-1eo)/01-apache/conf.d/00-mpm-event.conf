# Apache MPM Event — 32 vCPU / 256GB 기준
# MaxRequestWorkers = ServerLimit(32) x ThreadsPerChild(128) = 4096
<IfModule mpm_event_module>
    ServerLimit              32
    ThreadLimit              128
    StartServers             16
    MinSpareThreads          800
    MaxSpareThreads          4000
    ThreadsPerChild          128
    MaxRequestWorkers        4096
    MaxConnectionsPerChild   50000
</IfModule>
