# =====================================================================
# NSIGHT Apache HTTPD 2.4 Main Configuration
# /etc/httpd/conf/httpd.conf
# =====================================================================
ServerRoot "/etc/httpd"
ServerName nh.marketing.com:443
PidFile /run/httpd/httpd.pid

User apache
Group apache

Listen 80
Listen 443 https

IncludeOptional conf.modules.d/*.conf
# 20-proxy, 40-security 는 10-ssl-virtualhost.conf 에서만 Include (이중 로드 방지)
IncludeOptional conf.d/00-*.conf
IncludeOptional conf.d/10-*.conf
IncludeOptional conf.d/30-*.conf
IncludeOptional conf.d/50-*.conf

ServerTokens Prod
ServerSignature Off
TraceEnable Off

Timeout 15
ProxyTimeout 30

KeepAlive On
MaxKeepAliveRequests 500
KeepAliveTimeout 5

HostnameLookups Off
UseCanonicalName Off
FileETag None

ErrorLog "logs/error_log"
LogLevel warn

<Directory />
    AllowOverride none
    Require all denied
</Directory>

<Directory "/var/www/html">
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>
