# ============================================================
# NSIGHT Marketing Platform VirtualHost
# One Domain + 16 WAR URL Routing
# ============================================================

<VirtualHost *:80>
    ServerName nh.marketing.com
    RewriteEngine On
    RewriteRule ^/(.*)$ https://nh.marketing.com/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName nh.marketing.com

    SSLEngine on
    SSLCertificateFile      /app/apache/ssl/nh.marketing.com.crt
    SSLCertificateKeyFile   /app/apache/ssl/nh.marketing.com.key
    # SSLCertificateChainFile /app/apache/ssl/nh.marketing.com-chain.crt

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyTimeout 10

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "443"
    RequestHeader set X-Forwarded-Host  "nh.marketing.com"

    ProxyPass /health !
    <Location "/health">
        Require all granted
    </Location>

    # 16 WAR Context Routing (cc ic pc bc ms sv pd cm eb ep bp bd ss cs ct mg)
    ProxyPass        /cc/  balancer://nsight-marketing-was-cluster/cc/  retry=0 timeout=10
    ProxyPassReverse /cc/  balancer://nsight-marketing-was-cluster/cc/
    ProxyPassReverseCookiePath /cc/ /cc/

    ProxyPass        /ic/  balancer://nsight-marketing-was-cluster/ic/  retry=0 timeout=10
    ProxyPassReverse /ic/  balancer://nsight-marketing-was-cluster/ic/
    ProxyPassReverseCookiePath /ic/ /ic/

    ProxyPass        /pc/  balancer://nsight-marketing-was-cluster/pc/  retry=0 timeout=10
    ProxyPassReverse /pc/  balancer://nsight-marketing-was-cluster/pc/
    ProxyPassReverseCookiePath /pc/ /pc/

    ProxyPass        /bc/  balancer://nsight-marketing-was-cluster/bc/  retry=0 timeout=10
    ProxyPassReverse /bc/  balancer://nsight-marketing-was-cluster/bc/
    ProxyPassReverseCookiePath /bc/ /bc/

    ProxyPass        /ms/  balancer://nsight-marketing-was-cluster/ms/  retry=0 timeout=10
    ProxyPassReverse /ms/  balancer://nsight-marketing-was-cluster/ms/
    ProxyPassReverseCookiePath /ms/ /ms/

    ProxyPass        /sv/  balancer://nsight-marketing-was-cluster/sv/  retry=0 timeout=10
    ProxyPassReverse /sv/  balancer://nsight-marketing-was-cluster/sv/
    ProxyPassReverseCookiePath /sv/ /sv/

    ProxyPass        /pd/  balancer://nsight-marketing-was-cluster/pd/  retry=0 timeout=10
    ProxyPassReverse /pd/  balancer://nsight-marketing-was-cluster/pd/
    ProxyPassReverseCookiePath /pd/ /pd/

    ProxyPass        /cm/  balancer://nsight-marketing-was-cluster/cm/  retry=0 timeout=10
    ProxyPassReverse /cm/  balancer://nsight-marketing-was-cluster/cm/
    ProxyPassReverseCookiePath /cm/ /cm/

    ProxyPass        /eb/  balancer://nsight-marketing-was-cluster/eb/  retry=0 timeout=10
    ProxyPassReverse /eb/  balancer://nsight-marketing-was-cluster/eb/
    ProxyPassReverseCookiePath /eb/ /eb/

    ProxyPass        /ep/  balancer://nsight-marketing-was-cluster/ep/  retry=0 timeout=10
    ProxyPassReverse /ep/  balancer://nsight-marketing-was-cluster/ep/
    ProxyPassReverseCookiePath /ep/ /ep/

    ProxyPass        /bp/  balancer://nsight-marketing-was-cluster/bp/  retry=0 timeout=10
    ProxyPassReverse /bp/  balancer://nsight-marketing-was-cluster/bp/
    ProxyPassReverseCookiePath /bp/ /bp/

    ProxyPass        /bd/  balancer://nsight-marketing-was-cluster/bd/  retry=0 timeout=10
    ProxyPassReverse /bd/  balancer://nsight-marketing-was-cluster/bd/
    ProxyPassReverseCookiePath /bd/ /bd/

    ProxyPass        /ss/  balancer://nsight-marketing-was-cluster/ss/  retry=0 timeout=10
    ProxyPassReverse /ss/  balancer://nsight-marketing-was-cluster/ss/
    ProxyPassReverseCookiePath /ss/ /ss/

    ProxyPass        /cs/  balancer://nsight-marketing-was-cluster/cs/  retry=0 timeout=10
    ProxyPassReverse /cs/  balancer://nsight-marketing-was-cluster/cs/
    ProxyPassReverseCookiePath /cs/ /cs/

    ProxyPass        /ct/  balancer://nsight-marketing-was-cluster/ct/  retry=0 timeout=10
    ProxyPassReverse /ct/  balancer://nsight-marketing-was-cluster/ct/
    ProxyPassReverseCookiePath /ct/ /ct/

    ProxyPass        /mg/  balancer://nsight-marketing-was-cluster/mg/  retry=0 timeout=10
    ProxyPassReverse /mg/  balancer://nsight-marketing-was-cluster/mg/
    ProxyPassReverseCookiePath /mg/ /mg/

    RedirectMatch 302 ^/$ /cc/

    ErrorLog  logs/nsight-marketing-error.log
    CustomLog logs/nsight-marketing-access.log nsight_combined
</VirtualHost>
