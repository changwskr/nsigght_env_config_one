# ============================================================
# Apache MPM Event Config (MONO)
# 32 vCPU / 256GB 서버 기준. 성능 테스트 후 조정.
#
# [MPM Event 구조]
#   프로세스(Worker) → 스레드 → 요청 처리
#   MaxRequestWorkers = ServerLimit x ThreadsPerChild = 32 x 128 = 4096
#
# [연동 관계]
#   - httpd.conf : Include conf/extra/nsight-mpm.conf 로 로드
#   - nsight-vhost.conf : VirtualHost 요청을 이 워커 풀에서 처리
# ============================================================

<IfModule mpm_event_module>

    # 컴파일/런타임 상한 — 프로세스(Worker) 최대 개수
    # 32 vCPU 기준: CPU 코어 수와 동일하게 설정
    ServerLimit              32

    # 프로세스당 스레드 수 상한 (ThreadsPerChild 최댓값 제한)
    ThreadLimit              128

    # Apache 기동 시 최초 생성 프로세스 수
    StartServers             16

    # 유휴 스레드 최소 — 이 값 미만이면 추가 프로세스/스레드 생성
    MinSpareThreads          800

    # 유휴 스레드 최대 — 초과 시 불필요 프로세스 정리
    MaxSpareThreads          4000

    # 프로세스(Worker) 1개당 담당 스레드 수
    ThreadsPerChild          128

    # 동시 처리 가능한 최대 요청 수 (전체 상한)
    # ServerLimit(32) x ThreadsPerChild(128) = 4096
    MaxRequestWorkers        4096

    # 프로세스 1개가 처리한 연결 수 상한 — 도달 시 프로세스 재시작(메모리 누수 방지)
    MaxConnectionsPerChild   50000

</IfModule>
