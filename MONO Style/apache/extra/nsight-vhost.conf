# ============================================================
# NSIGHT Marketing Platform VirtualHost (MONO)
# Domain: nh.marketing.com
# 17개 업무 WAR URL Prefix 라우팅
#
# [연동 관계]
#   - nsight-balancer.conf : balancer://tomcat-cluster 정의
#   - tomcat contexts/     : path ↔ WAR 매핑 (예: /cc → cc.war)
#   - httpd.conf           : nsight_combined 로그 포맷 (GUID/Trace)
#
# [WAR ↔ URL 매핑]
#   /cc → cc.war   /ic → ic.war   /pc → pc.war   /bc → bc.war
#   /ms → ms.war   /sv → sv.war   /pd → pd.war   /cm → cm.war
#   /eb → eb.war   /ep → ep.war   /bp → bp.war   /bd → bd.war
#   /ss → ss.war   /cs → cs.war   /ct → ct.war   /mg → mg.war
#   /   → ROOT.war (root.war 배포 시 ROOT.war 로 rename)
# ============================================================

# ------------------------------------------------------------
# HTTP(80) — HTTPS 강제 리다이렉트
# ------------------------------------------------------------
<VirtualHost *:80>
    ServerName nh.marketing.com

    # 모든 HTTP 요청을 HTTPS로 301 영구 리다이렉트
    RewriteEngine On
    RewriteRule ^/(.*)$ https://nh.marketing.com/$1 [R=301,L]
</VirtualHost>

# ------------------------------------------------------------
# HTTPS(443) — SSL 종료 + Tomcat 프록시
# ------------------------------------------------------------
<VirtualHost *:443>
    ServerName nh.marketing.com

    # ---- SSL 설정 ----
    SSLEngine on
    # TLS 1.2 이상만 허용 (구버전 프로토콜 제외)
    SSLProtocol all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5:!3DES
    SSLHonorCipherOrder on
    # 운영 반영 시 실제 인증서 경로로 변경
    SSLCertificateFile      /app/apache/ssl/nh.marketing.com.crt
    SSLCertificateKeyFile   /app/apache/ssl/nh.marketing.com.key
    SSLCertificateChainFile /app/apache/ssl/nh.marketing.com-chain.crt

    # ---- 프록시 공통 ----
    ProxyRequests Off       # Forward Proxy 비활성 (보안)
    ProxyPreserveHost On    # 원본 Host 헤더 유지 (nh.marketing.com)
    ProxyTimeout 30         # 백엔드 응답 대기 제한(초)

    # Tomcat/Spring이 HTTPS·도메인을 올바르게 인식하도록 전달
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "443"
    RequestHeader set X-Forwarded-Host  "nh.marketing.com"

    # ---- 17개 업무 WAR 라우팅 (단일 Tomcat Cluster) ----
    # ProxyPass        : 클라이언트 요청 → balancer://tomcat-cluster/{context}/
    # ProxyPassReverse : Tomcat 응답 Location 헤더의 내부 URL을 외부 URL로 변환
    # retry=0          : Sticky Session 환경에서 장애 노드 재시도 방지
    # timeout=30       : 업무 처리 대기 제한(초)

    ProxyPass        /cc/     balancer://tomcat-cluster/cc/     retry=0 timeout=30
    ProxyPassReverse /cc/     balancer://tomcat-cluster/cc/

    ProxyPass        /ic/     balancer://tomcat-cluster/ic/     retry=0 timeout=30
    ProxyPassReverse /ic/     balancer://tomcat-cluster/ic/

    ProxyPass        /pc/     balancer://tomcat-cluster/pc/     retry=0 timeout=30
    ProxyPassReverse /pc/     balancer://tomcat-cluster/pc/

    ProxyPass        /bc/     balancer://tomcat-cluster/bc/     retry=0 timeout=30
    ProxyPassReverse /bc/     balancer://tomcat-cluster/bc/

    ProxyPass        /ms/     balancer://tomcat-cluster/ms/     retry=0 timeout=30
    ProxyPassReverse /ms/     balancer://tomcat-cluster/ms/

    ProxyPass        /sv/     balancer://tomcat-cluster/sv/     retry=0 timeout=30
    ProxyPassReverse /sv/     balancer://tomcat-cluster/sv/

    ProxyPass        /pd/     balancer://tomcat-cluster/pd/     retry=0 timeout=30
    ProxyPassReverse /pd/     balancer://tomcat-cluster/pd/

    ProxyPass        /cm/     balancer://tomcat-cluster/cm/     retry=0 timeout=30
    ProxyPassReverse /cm/     balancer://tomcat-cluster/cm/

    ProxyPass        /eb/     balancer://tomcat-cluster/eb/     retry=0 timeout=30
    ProxyPassReverse /eb/     balancer://tomcat-cluster/eb/

    ProxyPass        /ep/     balancer://tomcat-cluster/ep/     retry=0 timeout=30
    ProxyPassReverse /ep/     balancer://tomcat-cluster/ep/

    ProxyPass        /bp/     balancer://tomcat-cluster/bp/     retry=0 timeout=30
    ProxyPassReverse /bp/     balancer://tomcat-cluster/bp/

    ProxyPass        /bd/     balancer://tomcat-cluster/bd/     retry=0 timeout=30
    ProxyPassReverse /bd/     balancer://tomcat-cluster/bd/

    ProxyPass        /ss/     balancer://tomcat-cluster/ss/     retry=0 timeout=30
    ProxyPassReverse /ss/     balancer://tomcat-cluster/ss/

    ProxyPass        /cs/     balancer://tomcat-cluster/cs/     retry=0 timeout=30
    ProxyPassReverse /cs/     balancer://tomcat-cluster/cs/

    ProxyPass        /ct/     balancer://tomcat-cluster/ct/     retry=0 timeout=30
    ProxyPassReverse /ct/     balancer://tomcat-cluster/ct/

    ProxyPass        /mg/     balancer://tomcat-cluster/mg/     retry=0 timeout=30
    ProxyPassReverse /mg/     balancer://tomcat-cluster/mg/

    # ---- 헬스체크 (Tomcat 경유 없이 Apache 직접 응답) ----
    # 반드시 root(/) ProxyPass 보다 먼저 선언해야 함
    ProxyPass        /health/ !
    <Location "/health/">
        Require all granted
        SetHandler server-status
    </Location>

    # ---- root.war (context-path: /) ----
    # catch-all 규칙이므로 가장 마지막에 선언
    ProxyPass        /        balancer://tomcat-cluster/        retry=0 timeout=30
    ProxyPassReverse /        balancer://tomcat-cluster/

    # ---- VirtualHost 전용 로그 (GUID/Trace 포함 — httpd.conf nsight_combined) ----
    ErrorLog  logs/nsight-marketing-error.log
    CustomLog logs/nsight-marketing-access.log nsight_combined
</VirtualHost>
