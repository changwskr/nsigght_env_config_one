# ============================================================
# NSIGHT MONO Tomcat Cluster Balancer
# Tomcat-01 / Tomcat-02 각각 17개 WAR 동일 배포
# Sticky Session: jvmRoute 기반 (JSESSIONID route suffix)
# L4 Sticky Session과 병행 운영 가능
#
# [연동 관계]
#   - nsight-vhost.conf : ProxyPass 대상으로 balancer://tomcat-cluster 참조
#   - tomcat setenv.sh  : JVM_ROUTE=tomcat01 / tomcat02 (route 값과 일치 필수)
#   - tomcat server.xml : Engine jvmRoute="${JVM_ROUTE}"
# ============================================================

# Tomcat 클러스터 밸런서 정의 (nsight-vhost.conf에서 참조)
<Proxy "balancer://tomcat-cluster">

    # Tomcat-01 — route 값은 server.xml jvmRoute 및 setenv.sh JVM_ROUTE와 동일해야 함
    # connectiontimeout : 백엔드 연결 시도 제한(초)
    # timeout           : 응답 대기 제한(초)
    # retry=0           : 장애 노드로 재시도하지 않음 (Sticky Session 환경 권장)
    BalancerMember "http://10.10.20.11:8080" route=tomcat01 connectiontimeout=3 timeout=30 retry=0

    # Tomcat-02
    BalancerMember "http://10.10.20.12:8080" route=tomcat02 connectiontimeout=3 timeout=30 retry=0

    # 로드밸런싱 방식: 요청 수 기준 균등 분배 (Sticky 미적용 시)
    ProxySet lbmethod=byrequests

    # Sticky Session — JSESSIONID 쿠키의 jvmRoute suffix로 동일 Tomcat 고정
    #   예) JSESSIONID=ABC123.tomcat01
    # stickysessionnocookie=On : URL에 ;jsessionid= 가 있을 때도 route 인식
    # scolonpathdelim=|        : 쿠키/URL 내 구분자 처리
    ProxySet stickysession=JSESSIONID|jsessionid scolonpathdelim=| stickysessionnocookie=On

    # 백엔드 응답 타임아웃 시 해당 노드를 일시 제외
    ProxySet failontimeout=On

</Proxy>
