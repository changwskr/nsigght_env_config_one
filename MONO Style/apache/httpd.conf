# ============================================================
# NSIGHT Marketing Platform (MONO) - Apache HTTPD Main Config
# Domain : nh.marketing.com
# Role   : SSL termination + 17 WAR URL routing + Sticky Session
# Session: Tomcat DeltaManager (in-memory replication)
#
# [구성 파일 분리]
#   conf/extra/nsight-mpm.conf      — MPM Event 워커(32 vCPU / 256GB)
#   conf/extra/nsight-balancer.conf — Tomcat Cluster + Sticky Session
#   conf/extra/nsight-vhost.conf    — SSL VirtualHost + 17 ProxyPass
# ============================================================

# Apache 설치 루트 경로 (모듈·설정·로그 상대 경로 기준)
ServerRoot "/app/apache"

# 수신 포트 — 80(HTTP→HTTPS 리다이렉트), 443(HTTPS 실서비스)
Listen 80
Listen 443

# 기본 서버 도메인
ServerName nh.marketing.com

# ---- 보안: 서버 정보 노출 최소화 ----
ServerTokens Prod      # 응답 헤더에 Apache 버전 숨김
ServerSignature Off    # 에러 페이지 하단 서버 정보 숨김
TraceEnable Off        # HTTP TRACE 메서드 비활성 (XST 공격 방지)

# Apache 프로세스 실행 계정
User apache
Group apache

PidFile logs/httpd.pid

# ---- 연결/Keep-Alive ----
Timeout 30                  # 요청 대기 제한(초)
KeepAlive On                # 동일 TCP 연결 재사용
KeepAliveTimeout 5          # Keep-Alive 유지 시간(초)
MaxKeepAliveRequests 500    # 연결당 최대 요청 수 (32C 환경 기준 상향)

# ---- 필수 모듈 로드 ----
LoadModule mpm_event_module modules/mod_mpm_event.so              # MPM Event (고성능)
LoadModule unixd_module modules/mod_unixd.so                      # 프로세스 권한 하향
LoadModule authz_core_module modules/mod_authz_core.so            # 접근 제어
LoadModule log_config_module modules/mod_log_config.so            # Access/Error Log
LoadModule mime_module modules/mod_mime.so                        # MIME 타입
LoadModule dir_module modules/mod_dir.so                          # 디렉터리 인덱스
LoadModule alias_module modules/mod_alias.so                      # URL 별칭
LoadModule headers_module modules/mod_headers.so                  # 응답/요청 헤더 조작
LoadModule proxy_module modules/mod_proxy.so                      # Reverse Proxy
LoadModule proxy_http_module modules/mod_proxy_http.so            # HTTP 프록시
LoadModule proxy_balancer_module modules/mod_proxy_balancer.so    # 로드밸런서
LoadModule slotmem_shm_module modules/mod_slotmem_shm.so          # 밸런서 공유 메모리
LoadModule lbmethod_byrequests_module modules/mod_lbmethod_byrequests.so  # 분산 방식
LoadModule ssl_module modules/mod_ssl.so                          # SSL/TLS
LoadModule status_module modules/mod_status.so                    # 서버 상태 (/health)
LoadModule rewrite_module modules/mod_rewrite.so                  # URL 리다이렉트 (HTTP→HTTPS)

# ---- 전역 로그 ----
ErrorLog logs/error.log
LogLevel warn

# nsight_combined — GUID·Trace ID·응답시간(ms) 포함 커스텀 Access Log 포맷
#   %h  : 클라이언트 IP
#   %>s : HTTP 상태 코드
#   %D  : 요청 처리 시간(마이크로초)
#   guid/trace : 애플리케이션 추적 헤더 (X-GUID, X-Trace-Id)
LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" guid=%{X-GUID}i trace=%{X-Trace-Id}i rt=%D" nsight_combined
CustomLog logs/access.log nsight_combined

TypesConfig conf/mime.types
DirectoryIndex index.html

# ---- 보안 응답 헤더 (전역 적용) ----
Header always set X-Frame-Options "SAMEORIGIN"              # 클릭재킹 방지
Header always set X-Content-Type-Options "nosniff"          # MIME 스니핑 방지
Header always set X-XSS-Protection "1; mode=block"          # XSS 필터
Header always set Referrer-Policy "strict-origin-when-cross-origin"

# ---- 분리 설정 Include (로드 순서: mpm → balancer → vhost) ----
Include conf/extra/nsight-mpm.conf
Include conf/extra/nsight-balancer.conf
Include conf/extra/nsight-vhost.conf
