# ============================================================
# nsight-bc Configuration (MONO)
# WAR: bc.war
#
# [연동 관계]
#   - Apache nsight-vhost.conf : ProxyPass /bc/ → balancer://tomcat-cluster/bc/
#   - Tomcat contexts/bc.xml   : path="/bc" docBase="bc.war"
#   - application-common.yml     : Session / HikariCP / MyBatis 공통 설정
#
# [배포 경로]
#   /app/nsight/config/apps/bc/application.yml
#   setenv.sh -Dspring.config.additional-location=/app/nsight/config/
# ============================================================

spring:
  application:
    # Spring Boot 애플리케이션 식별명 (로그·모니터링 태그)
    name: nsight-bc

  config:
    # 공통 설정 import — Session, HikariCP(RDW/ADW), MyBatis, 타임아웃 등
    # optional: 파일 없어도 기동 실패하지 않음 (로컬 개발 편의)
    import: optional:file:/app/nsight/config/application-common.yml

server:
  servlet:
    # URL context-path — Apache ProxyPass /bc/ 및 Tomcat Context path와 일치 필수
    context-path: /bc

nsight:
  service:
    code: BC           # 업무 코드 (로그·모니터링·권한 구분용)
    name: nsight-bc    # 서비스 표시명
    war: bc.war        # 배포 WAR 파일명 (webapps/bc.war)
