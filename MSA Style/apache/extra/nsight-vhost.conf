# ============================================================
# NSIGHT Marketing Platform VirtualHost
# Domain: nh.marketing.com
# ============================================================

<VirtualHost *:80>
    ServerName nh.marketing.com
    RewriteEngine On
    RewriteRule ^/(.*)$ https://nh.marketing.com/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName nh.marketing.com

    SSLEngine on
    SSLProtocol all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1
    SSLCertificateFile      /app/apache/ssl/nh.marketing.com.crt
    SSLCertificateKeyFile   /app/apache/ssl/nh.marketing.com.key

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyTimeout 10

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "443"
    RequestHeader set X-Forwarded-Host  "nh.marketing.com"

    # Platform/Login first
    ProxyPass        /platform/  balancer://platform-cluster/  retry=0 timeout=10
    ProxyPassReverse /platform/  balancer://platform-cluster/

    ProxyPass        /customer/  balancer://customer-cluster/  retry=0 timeout=10
    ProxyPassReverse /customer/  balancer://customer-cluster/

    ProxyPass        /campaign/  balancer://campaign-cluster/  retry=0 timeout=10
    ProxyPassReverse /campaign/  balancer://campaign-cluster/

    ProxyPass        /event/     balancer://event-cluster/     retry=0 timeout=10
    ProxyPassReverse /event/     balancer://event-cluster/

    ProxyPass        /support/   balancer://support-cluster/   retry=0 timeout=10
    ProxyPassReverse /support/   balancer://support-cluster/

    # Health check endpoint
    ProxyPass        /health/    !
    <Location "/health/">
        Require all granted
    </Location>

    ErrorLog  logs/nsight-marketing-error.log
    CustomLog logs/nsight-marketing-access.log nsight_combined
</VirtualHost>
