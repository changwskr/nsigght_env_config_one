# ============================================================
# NSIGHT Service Clusters
# Routing unit: MSA service deployment unit
# Session sharing: Spring Session JDBC (shared DB), not Tomcat DeltaManager
# Sticky is optional. byrequests is used here.
# ============================================================

<Proxy "balancer://customer-cluster">
    BalancerMember "http://10.10.11.11:8080" route=cust1 connectiontimeout=3 timeout=10 retry=0
    BalancerMember "http://10.10.11.12:8080" route=cust2 connectiontimeout=3 timeout=10 retry=0
    ProxySet lbmethod=byrequests
</Proxy>

