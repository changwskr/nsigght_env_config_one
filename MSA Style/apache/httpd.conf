# ============================================================
# NSIGHT Marketing Platform - Apache HTTPD Main Config
# Domain : nh.marketing.com
# Role   : SSL termination + URL based routing to service clusters
# ============================================================

ServerRoot "/app/apache"

Listen 80
Listen 443

ServerName nh.marketing.com

ServerTokens Prod
ServerSignature Off
TraceEnable Off

User apache
Group apache

PidFile logs/httpd.pid

Timeout 30
KeepAlive On
KeepAliveTimeout 5
MaxKeepAliveRequests 100

# Required Modules
LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule mime_module modules/mod_mime.so
LoadModule dir_module modules/mod_dir.so
LoadModule alias_module modules/mod_alias.so
LoadModule headers_module modules/mod_headers.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule proxy_balancer_module modules/mod_proxy_balancer.so
LoadModule slotmem_shm_module modules/mod_slotmem_shm.so
LoadModule lbmethod_byrequests_module modules/mod_lbmethod_byrequests.so
LoadModule ssl_module modules/mod_ssl.so
LoadModule status_module modules/mod_status.so
LoadModule rewrite_module modules/mod_rewrite.so

ErrorLog logs/error.log
LogLevel warn

LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" guid=%{X-GUID}i trace=%{X-Trace-Id}i rt=%D" nsight_combined
CustomLog logs/access.log nsight_combined

TypesConfig conf/mime.types
DirectoryIndex index.html

# Security Headers
Header always set X-Frame-Options "SAMEORIGIN"
Header always set X-Content-Type-Options "nosniff"
Header always set X-XSS-Protection "1; mode=block"
Header always set Referrer-Policy "strict-origin-when-cross-origin"

Include conf/extra/nsight-mpm.conf
Include conf/extra/nsight-balancer.conf
Include conf/extra/nsight-vhost.conf
